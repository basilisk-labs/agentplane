name: Bug report
description: Report a reproducible AgentPlane bug.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, files, and output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentPlane version
      placeholder: "agentplane --version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
