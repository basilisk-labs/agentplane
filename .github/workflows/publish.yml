name: Publish release

on:
  workflow_run:
    workflows:
      - Core CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: "Exact Git commit SHA to publish or recover from (preferred over ref)"
        required: false
      ref:
        description: "Git ref to evaluate only when sha is omitted (default: main)"
        required: false
        default: "main"

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.sha || github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release candidate
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
      ref: ${{ steps.ref.outputs.ref }}
      sha: ${{ steps.source.outputs.sha }}
      core_published: ${{ steps.detect.outputs.core_published }}
      recipes_published: ${{ steps.detect.outputs.recipes_published }}
      cli_published: ${{ steps.detect.outputs.cli_published }}
      release_ready_run_id: ${{ steps.source.outputs.release_ready_run_id }}
      release_ready_artifact_name: ${{ steps.source.outputs.release_ready_artifact_name }}
      release_ready_state: ${{ steps.source.outputs.release_ready_state }}
    steps:
      - name: Resolve publish target
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.sha }}" ]; then
              echo "ref=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0
      - name: Checkout current workflow runtime
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.sha != ''
        uses: actions/checkout@v6
        with:
          path: .agentplane/.release/runtime
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Resolve release-ready source
        id: source
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .agentplane/.release/ready
          RUNTIME_SCRIPT="scripts/resolve-release-ready-source.mjs"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.sha }}" ]; then
            SHA="${{ github.event.inputs.sha }}"
            RUNTIME_SCRIPT=".agentplane/.release/runtime/scripts/resolve-release-ready-source.mjs"
            node "${RUNTIME_SCRIPT}" \
              --workflow ci.yml \
              --sha "${SHA}" \
              --json > .agentplane/.release/ready/source.json
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/resolve-canonical-release-sha.mjs --json > .agentplane/.release/ready/canonical.json
            SHA="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/canonical.json','utf8')); process.stdout.write(String(payload.sha || ''));")"
            if [ -z "${SHA}" ]; then
              echo "No canonical release candidate resolved from $(git rev-parse HEAD)." >&2
              exit 1
            fi
            node "${RUNTIME_SCRIPT}" \
              --workflow ci.yml \
              --sha "${SHA}" \
              --json > .agentplane/.release/ready/source.json
          else
            SHA="$(git rev-parse HEAD)"
            SOURCE_STATUS=0
            if node "${RUNTIME_SCRIPT}" \
              --workflow ci.yml \
              --sha "${SHA}" \
              --run-id "${{ github.event.workflow_run.id }}" \
              --json > .agentplane/.release/ready/source.json; then
              SOURCE_STATUS=0
            else
              SOURCE_STATUS=$?
            fi
            if [ ! -f .agentplane/.release/ready/source.json ]; then
              exit "${SOURCE_STATUS}"
            fi
          fi
          RELEASE_READY_OK="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/source.json','utf8')); process.stdout.write(payload.ok ? 'true' : 'false');")"
          RELEASE_READY_STATE="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/source.json','utf8')); process.stdout.write(String(payload.state || 'unknown'));")"
          RELEASE_READY_RUN_ID="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/source.json','utf8')); process.stdout.write(String(payload.run?.id || ''));")"
          RELEASE_READY_ARTIFACT_NAME="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/source.json','utf8')); process.stdout.write(String(payload.artifact?.name || ''));")"
          {
            echo "sha=${SHA}"
            echo "release_ready_ok=${RELEASE_READY_OK}"
            echo "release_ready_state=${RELEASE_READY_STATE}"
            echo "release_ready_run_id=${RELEASE_READY_RUN_ID}"
            echo "release_ready_artifact_name=${RELEASE_READY_ARTIFACT_NAME}"
          } >> "$GITHUB_OUTPUT"
          node -e 'const fs=require("node:fs"); const payload=JSON.parse(fs.readFileSync(".agentplane/.release/ready/source.json","utf8")); console.log(payload.message); if (payload.nextAction) console.log("Next action: " + payload.nextAction);'
      - name: Detect publish target
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          VERSION_CORE=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/core/package.json','utf8')).version")
          VERSION_RECIPES=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/recipes/package.json','utf8')).version")
          VERSION_CLI=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/agentplane/package.json','utf8')).version")
          CORE_DEP=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/agentplane/package.json','utf8')).dependencies['@agentplaneorg/core']")
          RECIPES_DEP=$(node -p "JSON.parse(require('node:fs').readFileSync('packages/agentplane/package.json','utf8')).dependencies['@agentplaneorg/recipes']")
          if [ "$VERSION_CORE" != "$VERSION_CLI" ] || [ "$VERSION_RECIPES" != "$VERSION_CLI" ] || [ "$VERSION_CORE" != "$CORE_DEP" ] || [ "$VERSION_RECIPES" != "$RECIPES_DEP" ]; then
            echo "release parity failed: core=$VERSION_CORE recipes=$VERSION_RECIPES cli=$VERSION_CLI core_dep=$CORE_DEP recipes_dep=$RECIPES_DEP" >&2
            exit 1
          fi

          SHA="${{ steps.source.outputs.sha }}"
          VERSION="$VERSION_CLI"
          TAG="v${VERSION}"
          NOTES="docs/releases/${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "missing release notes: $NOTES" >&2
            exit 1
          fi

          CORE_PUBLISHED=false
          RECIPES_PUBLISHED=false
          CLI_PUBLISHED=false
          if npm view "@agentplaneorg/core@${VERSION}" version >/dev/null 2>&1; then CORE_PUBLISHED=true; fi
          if npm view "@agentplaneorg/recipes@${VERSION}" version >/dev/null 2>&1; then RECIPES_PUBLISHED=true; fi
          if npm view "agentplane@${VERSION}" version >/dev/null 2>&1; then CLI_PUBLISHED=true; fi

          {
            if [ "${{ steps.source.outputs.release_ready_ok }}" != "true" ]; then
              echo "should_publish=false"
            elif [ "$CORE_PUBLISHED" = "true" ] && [ "$RECIPES_PUBLISHED" = "true" ] && [ "$CLI_PUBLISHED" = "true" ]; then
              echo "should_publish=false"
            else
              echo "should_publish=true"
            fi
            echo "sha=$SHA"
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "core_published=$CORE_PUBLISHED"
            echo "recipes_published=$RECIPES_PUBLISHED"
            echo "cli_published=$CLI_PUBLISHED"
          } >> "$GITHUB_OUTPUT"

  publish:
    needs: detect
    if: github.event_name == 'workflow_dispatch' && needs.detect.outputs.should_publish == 'true'
    environment: npm
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      NPM_CONFIG_PROVENANCE: "true"
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
      NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect.outputs.ref }}
          fetch-depth: 0
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Download release-ready artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.detect.outputs.release_ready_artifact_name }}
          path: .agentplane/.release/ready
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.detect.outputs.release_ready_run_id }}
      - name: Validate release-ready manifest
        shell: bash
        env:
          EXPECTED_SHA: ${{ needs.detect.outputs.sha }}
          EXPECTED_VERSION: ${{ needs.detect.outputs.version }}
          EXPECTED_TAG: ${{ needs.detect.outputs.tag }}
        run: |
          set -euo pipefail
          node - <<'EOF'
          const fs = require("node:fs");
          const payload = JSON.parse(
            fs.readFileSync(".agentplane/.release/ready/release-ready.json", "utf8"),
          );
          if (!payload.ready) {
            throw new Error(`release-ready artifact is not ready (reason=${payload.reasonCode ?? "unknown"})`);
          }
          if (payload.sha !== process.env.EXPECTED_SHA) {
            throw new Error(`release-ready sha mismatch: ${payload.sha} !== ${process.env.EXPECTED_SHA}`);
          }
          if (payload.version !== process.env.EXPECTED_VERSION) {
            throw new Error(`release-ready version mismatch: ${payload.version} !== ${process.env.EXPECTED_VERSION}`);
          }
          if (payload.tag !== process.env.EXPECTED_TAG) {
            throw new Error(`release-ready tag mismatch: ${payload.tag} !== ${process.env.EXPECTED_TAG}`);
          }
          EOF
      - run: npm i -g npm@11.5.1
      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Validate release notes
        run: node scripts/check-release-notes.mjs --tag "${{ needs.detect.outputs.tag }}"
      - name: Validate release versions
        run: node scripts/check-release-version.mjs --tag "${{ needs.detect.outputs.tag }}"
      - name: Validate exact-ref publish payload
        # The exact-SHA release-ready artifact already proves release-critical CI
        # readiness for this historical commit. The publish job only needs to
        # validate the checked-out payload it is about to tag and publish.
        run: bun run release:check
      - name: Validate origin tag state
        id: tag_state
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.detect.outputs.tag }}"
          TAG_REF="refs/tags/${TAG}"
          REMOTE_TAG_SHA="$(git ls-remote --tags origin "${TAG_REF}" | awk '{print $1}' | head -n1 || true)"
          REMOTE_PEELED_SHA="$(git ls-remote --tags origin "${TAG_REF}^{}" | awk '{print $1}' | head -n1 || true)"
          RESOLVED_REMOTE_SHA="${REMOTE_PEELED_SHA:-$REMOTE_TAG_SHA}"

          if [ -n "${RESOLVED_REMOTE_SHA}" ]; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "tag ${TAG} already exists on origin at ${RESOLVED_REMOTE_SHA}, continuing"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate release distribution assets
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-release-distribution.mjs \
            --out .agentplane/.release/publish/distribution \
            --version "${{ needs.detect.outputs.version }}" \
            --tag "${{ needs.detect.outputs.tag }}" \
            --sha "${{ needs.detect.outputs.sha }}" \
            --repo "${{ github.repository }}"
      - name: Smoke standalone release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect.outputs.version }}"
          DIST_DIR=".agentplane/.release/publish/distribution"
          for artifact in \
            "${DIST_DIR}/agentplane-v${VERSION}-darwin-arm64.tar.gz" \
            "${DIST_DIR}/agentplane-v${VERSION}-darwin-x64.tar.gz" \
            "${DIST_DIR}/agentplane-v${VERSION}-linux-arm64.tar.gz" \
            "${DIST_DIR}/agentplane-v${VERSION}-linux-x64.tar.gz" \
            "${DIST_DIR}/agentplane-v${VERSION}-win32-x64.zip"; do
            args=(
              scripts/smoke-standalone-cli-artifact.mjs
              --artifact "${artifact}"
              --expected-version "${VERSION}"
            )
            if [[ "${artifact}" != *"-linux-x64.tar.gz" ]]; then
              args+=(--skip-cli-commands)
            fi
            node "${args[@]}"
          done
      - name: Render Homebrew tap formula
        shell: bash
        run: |
          set -euo pipefail
          node scripts/render-homebrew-formula.mjs \
            --manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --out .agentplane/.release/publish/homebrew
      - name: Render Scoop bucket manifest
        shell: bash
        run: |
          set -euo pipefail
          node scripts/render-scoop-manifest.mjs \
            --manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --out .agentplane/.release/publish/scoop
      - name: Render setup-agentplane action
        shell: bash
        run: |
          set -euo pipefail
          node scripts/render-setup-agentplane-action.mjs \
            --manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --out .agentplane/.release/publish/setup-agentplane
      - name: Write npm auth config
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            {
              printf "//registry.npmjs.org/:_authToken=%s\n" "${NODE_AUTH_TOKEN}"
              printf "registry=https://registry.npmjs.org/\n"
            } > "$NPM_CONFIG_USERCONFIG"
          else
            printf "registry=https://registry.npmjs.org/\n" > "$NPM_CONFIG_USERCONFIG"
          fi
      - name: Publish @agentplaneorg/core
        id: publish_core
        if: needs.detect.outputs.core_published != 'true'
        working-directory: packages/core
        shell: bash
        run: |
          set -euo pipefail
          npm publish --provenance --access public --tag latest
      - name: Publish @agentplaneorg/recipes
        id: publish_recipes
        if: needs.detect.outputs.recipes_published != 'true'
        working-directory: packages/recipes
        shell: bash
        run: |
          set -euo pipefail
          npm publish --provenance --access public --tag latest
      - name: Publish agentplane
        id: publish_cli
        if: needs.detect.outputs.cli_published != 'true'
        working-directory: packages/agentplane
        shell: bash
        run: |
          set -euo pipefail
          npm publish --provenance --access public --tag latest
      - name: Post-publish npm smoke
        id: post_publish_smoke
        run: bun run release:smoke:published
      - name: Publish GHCR image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node scripts/render-ghcr-image-metadata.mjs \
            --manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --out .agentplane/.release/publish/ghcr
          set -a
          . .agentplane/.release/publish/ghcr/docker-build-args.env
          set +a
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            -f packages/agentplane/Dockerfile \
            --build-arg "AGENTPLANE_VERSION=${AGENTPLANE_VERSION}" \
            --build-arg "AGENTPLANE_TARBALL_FILE=${AGENTPLANE_TARBALL_FILE}" \
            --build-arg "AGENTPLANE_TARBALL_SHA256_FILE=${AGENTPLANE_TARBALL_SHA256_FILE}" \
            -t "${GHCR_VERSION_TAG}" \
            -t "${GHCR_RELEASE_TAG}" \
            -t "${GHCR_LATEST_TAG}" \
            .
          docker push "${GHCR_VERSION_TAG}"
          docker push "${GHCR_RELEASE_TAG}"
          docker push "${GHCR_LATEST_TAG}"
          node scripts/render-ghcr-image-metadata.mjs \
            --manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --out .agentplane/.release/publish/ghcr \
            --status published
      - name: Push release tag
        id: push_tag
        if: steps.tag_state.outputs.tag_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.detect.outputs.tag }}"
          git push origin "refs/tags/${{ needs.detect.outputs.tag }}"
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          body_path: docs/releases/${{ needs.detect.outputs.tag }}.md
          files: |
            .agentplane/.release/publish/distribution/agentplane-v${{ needs.detect.outputs.version }}-darwin-arm64.tar.gz
            .agentplane/.release/publish/distribution/agentplane-v${{ needs.detect.outputs.version }}-darwin-x64.tar.gz
            .agentplane/.release/publish/distribution/agentplane-v${{ needs.detect.outputs.version }}-linux-arm64.tar.gz
            .agentplane/.release/publish/distribution/agentplane-v${{ needs.detect.outputs.version }}-linux-x64.tar.gz
            .agentplane/.release/publish/distribution/agentplane-v${{ needs.detect.outputs.version }}-win32-x64.zip
            .agentplane/.release/publish/distribution/agentplane-upgrade.tar.gz
            .agentplane/.release/publish/distribution/agentplane-upgrade.tar.gz.sha256
            .agentplane/.release/publish/distribution/install.sh
            .agentplane/.release/publish/distribution/install.ps1
            .agentplane/.release/publish/distribution/SHA256SUMS
            .agentplane/.release/publish/distribution/release-distribution.json
            .agentplane/.release/publish/distribution/standalone-assets.json
      - name: Publish Homebrew tap PR
        continue-on-error: true
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || '' }}
        run: |
          set -euo pipefail
          node scripts/publish-external-distribution.mjs \
            --module homebrew \
            --repo basilisk-labs/homebrew-tap \
            --source .agentplane/.release/publish/homebrew \
            --copy Formula/agentplane.rb:Formula/agentplane.rb \
            --version "${{ needs.detect.outputs.version }}" \
            --tag "${{ needs.detect.outputs.tag }}" \
            --sha "${{ needs.detect.outputs.sha }}" \
            --token-env HOMEBREW_TAP_TOKEN \
            --out .agentplane/.release/publish/homebrew/homebrew-publish-result.json
      - name: Publish Scoop bucket PR
        continue-on-error: true
        shell: bash
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN || '' }}
        run: |
          set -euo pipefail
          node scripts/publish-external-distribution.mjs \
            --module scoop \
            --repo basilisk-labs/scoop-bucket \
            --source .agentplane/.release/publish/scoop \
            --copy agentplane.json:bucket/agentplane.json \
            --version "${{ needs.detect.outputs.version }}" \
            --tag "${{ needs.detect.outputs.tag }}" \
            --sha "${{ needs.detect.outputs.sha }}" \
            --token-env SCOOP_BUCKET_TOKEN \
            --out .agentplane/.release/publish/scoop/scoop-publish-result.json
      - name: Publish setup-agentplane PR
        continue-on-error: true
        shell: bash
        env:
          SETUP_AGENTPLANE_TOKEN: ${{ secrets.SETUP_AGENTPLANE_TOKEN || '' }}
        run: |
          set -euo pipefail
          node scripts/publish-external-distribution.mjs \
            --module setup-agentplane \
            --repo basilisk-labs/setup-agentplane \
            --source .agentplane/.release/publish/setup-agentplane \
            --copy action.yml:action.yml \
            --copy README.md:README.md \
            --version "${{ needs.detect.outputs.version }}" \
            --tag "${{ needs.detect.outputs.tag }}" \
            --sha "${{ needs.detect.outputs.sha }}" \
            --token-env SETUP_AGENTPLANE_TOKEN \
            --out .agentplane/.release/publish/setup-agentplane/setup-agentplane-publish-result.json
      - name: Upload release-distribution artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-distribution
          path: .agentplane/.release/publish/distribution/
          if-no-files-found: warn
      - name: Upload homebrew-module artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-module
          path: .agentplane/.release/publish/homebrew/
          if-no-files-found: warn
      - name: Upload scoop-module artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scoop-module
          path: .agentplane/.release/publish/scoop/
          if-no-files-found: warn
      - name: Upload ghcr-module artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ghcr-module
          path: .agentplane/.release/publish/ghcr/
          if-no-files-found: warn
      - name: Upload setup-agentplane-module artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: setup-agentplane-module
          path: .agentplane/.release/publish/setup-agentplane/
          if-no-files-found: warn
      - name: Write publish-result manifest
        if: always()
        shell: bash
        env:
          AGENTPLANE_PUBLISH_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          node scripts/manifest.mjs publish-result \
            --out .agentplane/.release/publish/publish-result.json \
            --sha "${{ needs.detect.outputs.sha }}" \
            --version "${{ needs.detect.outputs.version }}" \
            --tag "${{ needs.detect.outputs.tag }}" \
            --release-ready-run-id "${{ needs.detect.outputs.release_ready_run_id }}" \
            --distribution-manifest .agentplane/.release/publish/distribution/release-distribution.json \
            --job-status "${{ job.status }}" \
            --core-prepublished "${{ needs.detect.outputs.core_published }}" \
            --recipes-prepublished "${{ needs.detect.outputs.recipes_published }}" \
            --cli-prepublished "${{ needs.detect.outputs.cli_published }}" \
            --core-outcome "${{ steps.publish_core.outcome }}" \
            --recipes-outcome "${{ steps.publish_recipes.outcome }}" \
            --cli-outcome "${{ steps.publish_cli.outcome }}" \
            --smoke-outcome "${{ steps.post_publish_smoke.outcome }}" \
            --tag-exists "${{ steps.tag_state.outputs.tag_exists || 'false' }}" \
            --tag-outcome "${{ steps.push_tag.outcome }}" \
            --release-outcome "${{ steps.create_release.outcome }}"
          node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/publish/publish-result.json','utf8')); console.log(payload.message);"
      - name: Upload publish-result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-result
          path: .agentplane/.release/publish/publish-result.json
          if-no-files-found: error
      - name: Prepare release task evidence
        if: always()
        id: release_evidence
        env:
          RELEASE_SHA: ${{ needs.detect.outputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .agentplane/.release/publish
          if bun scripts/release-task-evidence.mjs prepare \
            --release-sha "${RELEASE_SHA}" \
            --publish-result .agentplane/.release/publish/publish-result.json \
            --repo "${REPO}" > .agentplane/.release/publish/release-task-evidence.json; then
            true
          else
            true
          fi
          node <<'EOF'
          const fs = require("node:fs");
          const payload = JSON.parse(
            fs.readFileSync(".agentplane/.release/publish/release-task-evidence.json", "utf8"),
          );
          const out = process.env.GITHUB_OUTPUT;
          if (!out) throw new Error("GITHUB_OUTPUT is not set");
          const lines = [`actionable=${payload.actionable ? "true" : "false"}`];
          for (const key of ["task_id", "base_ref", "release_sha", "closure_branch", "readme_path"]) {
            if (typeof payload[key] === "string" && payload[key].trim().length > 0) {
              lines.push(`${key}=${payload[key]}`);
            }
          }
          if (typeof payload.reason === "string") lines.push(`reason=${payload.reason}`);
          if (typeof payload.pr_title === "string") {
            lines.push("pr_title<<EOF");
            lines.push(payload.pr_title);
            lines.push("EOF");
          }
          if (typeof payload.pr_body === "string") {
            lines.push("pr_body<<EOF");
            lines.push(payload.pr_body);
            lines.push("EOF");
          }
          fs.appendFileSync(out, `${lines.join("\n")}\n`);
          EOF
      - name: Skip release evidence follow-up
        if: steps.release_evidence.outputs.actionable != 'true'
        run: |
          echo "release task evidence skipped: ${{ steps.release_evidence.outputs.reason }}"
      - name: Check for existing release evidence PR
        if: steps.release_evidence.outputs.actionable == 'true'
        id: release_evidence_existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_url="$(gh pr list \
            --state open \
            --head "${{ steps.release_evidence.outputs.closure_branch }}" \
            --base "${{ steps.release_evidence.outputs.base_ref }}" \
            --json url \
            --jq '.[0].url // ""')"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "${{ steps.release_evidence.outputs.closure_branch }}" >/dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply release task evidence on a follow-up branch
        if: |
          steps.release_evidence.outputs.actionable == 'true' &&
          steps.release_evidence_existing.outputs.pr_url == '' &&
          steps.release_evidence_existing.outputs.branch_exists != 'true'
        id: apply_release_evidence
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "refs/heads/${{ steps.release_evidence.outputs.base_ref }}:refs/remotes/origin/${{ steps.release_evidence.outputs.base_ref }}"
          git switch -C "${{ steps.release_evidence.outputs.closure_branch }}" "origin/${{ steps.release_evidence.outputs.base_ref }}"
          before_status="$(git status --short -- .agentplane/tasks/${{ steps.release_evidence.outputs.task_id }}/README.md)"
          bun scripts/release-task-evidence.mjs apply \
            --task-id "${{ steps.release_evidence.outputs.task_id }}" \
            --publish-result .agentplane/.release/publish/publish-result.json \
            --repo "${REPO}" \
            --author DEUS > .agentplane/.release/publish/release-task-apply.json
          after_status="$(git status --short -- .agentplane/tasks/${{ steps.release_evidence.outputs.task_id }}/README.md)"
          if [ -z "${after_status}" ] || [ "${before_status}" = "${after_status}" ]; then
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            echo "closure_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.release_evidence.outputs.readme_path }}"
          git commit --no-verify -m "📝 ${{ steps.release_evidence.outputs.task_id }} task: record hosted publish evidence"
          echo "created_commit=true" >> "$GITHUB_OUTPUT"
          echo "closure_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Push release evidence branch
        if: steps.apply_release_evidence.outputs.created_commit == 'true'
        run: |
          set -euo pipefail
          git push --set-upstream origin "${{ steps.release_evidence.outputs.closure_branch }}"
      - name: Open or recover release evidence PR
        if: |
          steps.release_evidence.outputs.actionable == 'true' &&
          steps.release_evidence_existing.outputs.pr_url == ''
        id: create_release_evidence_pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.release_evidence.outputs.pr_title }}
          PR_BODY: ${{ steps.release_evidence.outputs.pr_body }}
          MANUAL_PR_URL: ${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.release_evidence.outputs.base_ref }}...${{ steps.release_evidence.outputs.closure_branch }}?expand=1
        run: |
          set -euo pipefail
          if [ "${{ steps.release_evidence_existing.outputs.branch_exists }}" = "true" ] || [ "${{ steps.apply_release_evidence.outputs.created_commit }}" = "true" ]; then
            printf '%s\n' "$PR_BODY" > .agentplane/.release/publish/release-task-evidence-pr.md
            set +e
            pr_url="$(gh pr create \
              --base "${{ steps.release_evidence.outputs.base_ref }}" \
              --head "${{ steps.release_evidence.outputs.closure_branch }}" \
              --title "$PR_TITLE" \
              --body-file .agentplane/.release/publish/release-task-evidence-pr.md 2>.agentplane/.release/publish/release-task-evidence-pr.err)"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            elif grep -qi "not permitted to create or approve pull requests" .agentplane/.release/publish/release-task-evidence-pr.err; then
              echo "manual_pr_required=true" >> "$GITHUB_OUTPUT"
              echo "manual_pr_url=$MANUAL_PR_URL" >> "$GITHUB_OUTPUT"
              echo "::warning::Release evidence branch was pushed, but organization policy blocks GitHub Actions from creating the follow-up PR. Open it manually: $MANUAL_PR_URL"
            else
              cat .agentplane/.release/publish/release-task-evidence-pr.err >&2
              exit "$status"
            fi
          fi
      - name: Enable auto-merge for release evidence PR
        if: |
          steps.release_evidence.outputs.actionable == 'true' &&
          (steps.release_evidence_existing.outputs.pr_url != '' || steps.create_release_evidence_pr.outputs.pr_url != '')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_url="${{ steps.release_evidence_existing.outputs.pr_url }}"
          if [ -z "$pr_url" ]; then
            pr_url="${{ steps.create_release_evidence_pr.outputs.pr_url }}"
          fi
          if gh pr merge --squash --delete-branch "$pr_url"; then
            echo "Release evidence PR merged immediately: $pr_url"
          elif ! gh pr merge --auto --squash --delete-branch "$pr_url"; then
            echo "::warning::Release evidence PR created but neither direct merge nor auto-merge could be enabled; inspect $pr_url manually."
          fi
