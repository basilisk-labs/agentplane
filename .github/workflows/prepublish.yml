name: Pre-publish Checks

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (vX.Y.Z). Leave empty to validate current ref."
        required: false

permissions:
  contents: read

concurrency:
  group: prepublish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/path-filters.yml
          predicate-quantifier: every

  prepublish-matrix:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true'
    name: Pre-publish checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-latest
    env:
      GIT_AUTHOR_NAME: agentplane-ci
      GIT_AUTHOR_EMAIL: agentplane-ci@example.com
      GIT_COMMITTER_NAME: agentplane-ci
      GIT_COMMITTER_EMAIL: agentplane-ci@example.com
    steps:
      - name: Resolve target ref
        id: target
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Format (check)
        run: bun run format:check
      - name: Schemas (check)
        run: bun run schemas:check
      - name: Agent templates (check)
        run: bun run agents:check
      - name: Release parity (check)
        run: bun run release:parity
      - name: Release incidents (check)
        run: bun run release:incidents:check
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
          bun run --filter=@agentplane/testkit build
      - name: CLI docs (generated reference check)
        run: bun run docs:cli:check
      - name: Hotspot Threshold (check)
        run: bun run hotspots:check
      - name: Lint
        run: bun run lint:core
      - name: Architecture boundaries
        if: matrix.os == 'ubuntu-24.04'
        run: bun run arch:check
      - name: Dead code baseline (warn-only)
        if: matrix.os == 'ubuntu-24.04'
        run: bun run knip:check
      - name: Unit tests (fast)
        if: matrix.os == 'ubuntu-24.04'
        run: bun run test:fast
      - name: CLI E2E (critical)
        if: matrix.os == 'ubuntu-24.04'
        timeout-minutes: 10
        run: bun run test:critical
      - name: Significant File Coverage (guard)
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: bun run coverage:significant-suite
      - name: Unit tests (platform-critical)
        if: matrix.os == 'windows-latest'
        run: bun run test:platform-critical
