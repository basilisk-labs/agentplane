name: Pages Deploy

on:
  workflow_run:
    workflows:
      - Docs CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    env:
      GTM_CONTAINER_ID: GTM-P4FNLHQF
      GA_MEASUREMENT_ID: G-L8T8ZZ8RSG
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Download Docs CI website build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: pages-build-${{ github.event.workflow_run.head_sha }}
          path: website/build
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ steps.ref.outputs.ref }}
      - uses: oven-sh/setup-bun@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          node-version: "24"
      - name: Cache Bun artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-docs-bun-${{ hashFiles('bun.lock', 'website/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-docs-bun-
      - name: Install root dependencies
        if: github.event_name == 'workflow_dispatch'
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Install website dependencies
        if: github.event_name == 'workflow_dispatch'
        run: bun install --cwd website --frozen-lockfile --ignore-scripts
      - name: Build website
        if: github.event_name == 'workflow_dispatch'
        run: bun run docs:site:build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
