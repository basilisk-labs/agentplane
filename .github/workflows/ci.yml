name: Core CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: "Exact Git commit SHA to validate for release recovery (preferred over ref)"
        required: false
      ref:
        description: "Git ref to validate only when sha is omitted"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENTPLANE_CI_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sha != '' && github.event.inputs.sha || github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
  AGENTPLANE_RELEASE_RECOVERY_SHA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sha != '' && github.event.inputs.sha || '' }}

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.AGENTPLANE_CI_REF }}
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/path-filters.yml
          predicate-quantifier: some

  test:
    needs: changes
    if: >-
      (needs.changes.outputs.core == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.sha == '')) &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.sha != '')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.AGENTPLANE_CI_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Format (check)
        run: bun run format:check
      - name: Schemas (check)
        run: bun run schemas:check
      - name: Agent templates (check)
        run: bun run agents:check
      - name: Release parity (check)
        run: bun run release:parity
      # Build package dist + manifests so stale-dist checks pass in CLI/docs gates.
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
          bun run --filter=@agentplane/testkit build
      - name: CLI docs (generated reference check)
        run: bun run docs:cli:check
      - name: Hotspot Threshold (check)
        run: bun run hotspots:check
      - name: Lint
        run: bun run lint:core
      - name: Architecture boundaries
        run: bun run arch:check
      - name: Dead code baseline (warn-only)
        run: bun run knip:check
      - name: Unit Tests (Fast)
        run: bun run test:fast
        env:
          # Ensure tests that create git commits do not rely on global git config in CI.
          GIT_AUTHOR_NAME: agentplane-ci
          GIT_AUTHOR_EMAIL: agentplane-ci@example.com
          GIT_COMMITTER_NAME: agentplane-ci
          GIT_COMMITTER_EMAIL: agentplane-ci@example.com
      - name: CLI E2E (Critical)
        timeout-minutes: 10
        run: bun run test:critical
        env:
          GIT_AUTHOR_NAME: agentplane-ci
          GIT_AUTHOR_EMAIL: agentplane-ci@example.com
          GIT_COMMITTER_NAME: agentplane-ci
          GIT_COMMITTER_EMAIL: agentplane-ci@example.com
      - name: Workflow contract gate
        run: |
          if [ "${AGENTPLANE_WORKFLOW_ENFORCEMENT:-on}" = "off" ]; then
            echo "workflow gate skipped: AGENTPLANE_WORKFLOW_ENFORCEMENT=off"
            exit 0
          fi
          node packages/agentplane/bin/agentplane.js workflow build --validate --dry-run
          node packages/agentplane/bin/agentplane.js workflow build --validate
          node packages/agentplane/bin/agentplane.js doctor
      - name: Workflow/Harness Coverage (guard)
        run: bun run coverage:workflow-suite
      - name: Significant File Coverage (guard)
        run: bun run coverage:significant-suite

  test-windows:
    needs: changes
    if: >-
      (needs.changes.outputs.core == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.sha == '')) &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.sha != '')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.AGENTPLANE_CI_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Format (check)
        run: bun run format:check
      - name: Schemas (check)
        run: bun run schemas:check
      - name: Agent templates (check)
        run: bun run agents:check
      - name: Release parity (check)
        run: bun run release:parity
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
          bun run --filter=@agentplane/testkit build
      - name: Unit tests (platform-critical)
        run: bun run test:platform-critical
        env:
          GIT_AUTHOR_NAME: agentplane-ci
          GIT_AUTHOR_EMAIL: agentplane-ci@example.com
          GIT_COMMITTER_NAME: agentplane-ci
          GIT_COMMITTER_EMAIL: agentplane-ci@example.com

  recovery-validate:
    needs: changes
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.sha != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.AGENTPLANE_CI_REF }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Release parity (check)
        run: bun run release:parity
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
          bun run --filter=@agentplane/testkit build

  release-ready:
    name: Release-ready manifest
    needs:
      - changes
      - test
      - test-windows
      - recovery-validate
    if: >-
      always() &&
      (
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.sha != '' &&
          needs.recovery-validate.result == 'success'
        ) ||
        (
          !(github.event_name == 'workflow_dispatch' && github.event.inputs.sha != '') &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          (
            (
              needs.changes.outputs.core == 'true' &&
              needs.test.result == 'success' &&
              needs.test-windows.result == 'success'
            ) ||
            needs.changes.outputs.core != 'true'
          )
        )
      )
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.AGENTPLANE_CI_REF }}
      - name: Resolve release-ready target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Release incidents (check)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/check-release-incidents.mjs ]; then
            node scripts/check-release-incidents.mjs
          else
            echo "release incident gate skipped: target ref predates scripts/check-release-incidents.mjs"
          fi
      - name: Generate release-ready manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .agentplane/.release/ready
          node scripts/manifest.mjs release-ready \
            --out .agentplane/.release/ready/release-ready.json \
            --sha "${{ steps.target.outputs.sha }}" \
            --ref "${AGENTPLANE_CI_REF}" \
            --check-registry
          READY="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/release-ready.json','utf8')); process.stdout.write(payload.ready ? 'true' : 'false');")"
          echo "ready=${READY}" >> "$GITHUB_OUTPUT"
          node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync('.agentplane/.release/ready/release-ready.json','utf8')); console.log(payload.message);"
      - name: Upload release-ready artifact
        if: steps.manifest.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-ready
          path: .agentplane/.release/ready/release-ready.json
          if-no-files-found: error
      - name: Upload exact-sha release-ready artifact
        if: steps.manifest.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-ready-${{ steps.target.outputs.sha }}
          path: .agentplane/.release/ready/release-ready.json
          if-no-files-found: error
