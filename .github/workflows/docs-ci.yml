name: Docs CI

on:
  pull_request:
    paths:
      - "website/**"
      - "docs/**"
      - "DESIGN.md"
      - "scripts/generate-website-docs.mjs"
      - "scripts/check-design-language.mjs"
      - "scripts/check-docs-ia.mjs"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "docs/**"
      - "DESIGN.md"
      - "scripts/generate-website-docs.mjs"
      - "scripts/check-design-language.mjs"
      - "scripts/check-docs-ia.mjs"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs-ci.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-24.04
    env:
      GTM_CONTAINER_ID: GTM-P4FNLHQF
      GA_MEASUREMENT_ID: G-L8T8ZZ8RSG
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Cache Bun artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-docs-bun-${{ hashFiles('bun.lock', 'website/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-docs-bun-
      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Install website dependencies
        run: bun install --cwd website --frozen-lockfile --ignore-scripts
      - name: Generate docs from code
        run: bun run docs:site:generate
      - name: Typecheck website
        run: bun run docs:site:typecheck
      - name: Validate documentation information architecture
        run: bun run docs:ia:check
      - name: Build website
        run: bun run docs:site:build
      - name: Validate design language constraints
        run: bun run docs:site:check:design
      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
