name: Workflows Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflows-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.8
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Workflow command contract
        run: bun run workflows:command-check
