name: Task Hosted Close

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  hosted-close:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      GIT_AUTHOR_NAME: DEUS
      GIT_AUTHOR_EMAIL: deus@agentplane.org
      GIT_COMMITTER_NAME: DEUS
      GIT_COMMITTER_EMAIL: deus@agentplane.org
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
          bun run --filter=@agentplane/testkit build
      - name: Prepare hosted closure metadata
        id: prepare
        run: |
          set -euo pipefail
          mkdir -p .agentplane/tmp
          node scripts/prepare-hosted-task-closure.mjs --event-json "$GITHUB_EVENT_PATH" > .agentplane/tmp/hosted-task-close.json
          node <<'EOF'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(".agentplane/tmp/hosted-task-close.json", "utf8"));
          const out = process.env.GITHUB_OUTPUT;
          if (!out) throw new Error("GITHUB_OUTPUT is not set");
          const lines = [`actionable=${payload.actionable ? "true" : "false"}`];
          for (const key of ["task_id", "base_ref", "merge_sha", "source_branch", "closure_branch", "pr_number"]) {
            if (typeof payload[key] === "string" || typeof payload[key] === "number") {
              lines.push(`${key}=${payload[key]}`);
            }
          }
          if (typeof payload.reason === "string") lines.push(`reason=${payload.reason}`);
          if (typeof payload.pr_title === "string") {
            lines.push("pr_title<<EOF");
            lines.push(payload.pr_title);
            lines.push("EOF");
          }
          if (typeof payload.pr_body === "string") {
            lines.push("pr_body<<EOF");
            lines.push(payload.pr_body);
            lines.push("EOF");
          }
          fs.appendFileSync(out, `${lines.join("\n")}\n`);
          EOF
      - name: Skip non-task PRs
        if: steps.prepare.outputs.actionable != 'true'
        run: |
          echo "task hosted close skipped: ${{ steps.prepare.outputs.reason }}"
      - name: Check for existing hosted closure PR
        if: steps.prepare.outputs.actionable == 'true'
        id: existing
        run: |
          set -euo pipefail
          pr_url="$(gh pr list \
            --state open \
            --head "${{ steps.prepare.outputs.closure_branch }}" \
            --base "${{ steps.prepare.outputs.base_ref }}" \
            --json url \
            --jq '.[0].url // ""')"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "${{ steps.prepare.outputs.closure_branch }}" >/dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply hosted task closure on a local base checkout
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          steps.existing.outputs.pr_url == '' &&
          steps.existing.outputs.branch_exists != 'true'
        id: close
        run: |
          set -euo pipefail
          before="$(git rev-parse HEAD)"
          node packages/agentplane/bin/agentplane.js task hosted-close \
            --event-json "$GITHUB_EVENT_PATH" \
            --quiet
          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            echo "closure_sha=$after" >> "$GITHUB_OUTPUT"
          else
            echo "created_commit=true" >> "$GITHUB_OUTPUT"
            echo "closure_sha=$after" >> "$GITHUB_OUTPUT"
          fi
      - name: Push hosted closure branch
        if: steps.close.outputs.created_commit == 'true'
        run: |
          set -euo pipefail
          git switch -c "${{ steps.prepare.outputs.closure_branch }}"
          git push --set-upstream origin "${{ steps.prepare.outputs.closure_branch }}"
      - name: Open or recover hosted closure PR
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          steps.existing.outputs.pr_url == ''
        id: create-pr
        env:
          PR_TITLE: ${{ steps.prepare.outputs.pr_title }}
          PR_BODY: ${{ steps.prepare.outputs.pr_body }}
          MANUAL_PR_URL: ${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.prepare.outputs.base_ref }}...${{ steps.prepare.outputs.closure_branch }}?expand=1
        run: |
          set -euo pipefail
          if [ "${{ steps.existing.outputs.branch_exists }}" = "true" ] || [ "${{ steps.close.outputs.created_commit }}" = "true" ]; then
            printf '%s\n' "$PR_BODY" > .agentplane/tmp/hosted-task-close-pr.md
            set +e
            pr_url="$(gh pr create \
              --base "${{ steps.prepare.outputs.base_ref }}" \
              --head "${{ steps.prepare.outputs.closure_branch }}" \
              --title "$PR_TITLE" \
              --body-file .agentplane/tmp/hosted-task-close-pr.md 2>.agentplane/tmp/hosted-task-close-pr.err)"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            elif grep -qi "not permitted to create or approve pull requests" .agentplane/tmp/hosted-task-close-pr.err; then
              echo "manual_pr_required=true" >> "$GITHUB_OUTPUT"
              echo "manual_pr_url=$MANUAL_PR_URL" >> "$GITHUB_OUTPUT"
              echo "::warning::Hosted closure branch was pushed, but organization policy blocks GitHub Actions from creating the follow-up PR. Open it manually: $MANUAL_PR_URL"
            else
              cat .agentplane/tmp/hosted-task-close-pr.err >&2
              exit "$status"
            fi
          fi
      - name: Report manual hosted closure handoff
        if: steps.create-pr.outputs.manual_pr_required == 'true'
        env:
          MANUAL_PR_URL: ${{ steps.create-pr.outputs.manual_pr_url }}
        run: |
          set -euo pipefail
          cat > .agentplane/tmp/hosted-task-close-comment.md <<EOF
          Hosted closure branch is ready, but the organization currently blocks GitHub Actions from creating follow-up pull requests automatically.

          Manual next step:
          - open the closure PR: ${MANUAL_PR_URL}
          - merge it after the normal required checks turn green

          Context:
          - task_id: ${{ steps.prepare.outputs.task_id }}
          - source_branch: ${{ steps.prepare.outputs.source_branch }}
          - closure_branch: ${{ steps.prepare.outputs.closure_branch }}
          - merge_sha: ${{ steps.prepare.outputs.merge_sha }}
          EOF
          gh pr comment "${{ steps.prepare.outputs.pr_number }}" --body-file .agentplane/tmp/hosted-task-close-comment.md
          {
            echo "## Hosted closure pending manual PR"
            echo
            echo "Organization policy blocks GitHub Actions from creating PRs automatically."
            echo
            echo "- Manual PR URL: ${MANUAL_PR_URL}"
            echo "- Task: ${{ steps.prepare.outputs.task_id }}"
            echo "- Closure branch: ${{ steps.prepare.outputs.closure_branch }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Record hosted closure PR verification
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          (steps.existing.outputs.pr_url != '' || steps.create-pr.outputs.pr_url != '')
        run: |
          set -euo pipefail
          pr_url="${{ steps.existing.outputs.pr_url }}"
          if [ -z "$pr_url" ]; then
            pr_url="${{ steps.create-pr.outputs.pr_url }}"
          fi
          closure_sha="$(git ls-remote origin "${{ steps.prepare.outputs.closure_branch }}" | awk '{print $1}')"
          if [ -z "$closure_sha" ]; then
            echo "::error::Unable to resolve hosted closure branch SHA for ${{ steps.prepare.outputs.closure_branch }}"
            exit 1
          fi
          pr_head_sha="$(gh pr view "$pr_url" --json headRefOid --jq .headRefOid)"
          if [ "$closure_sha" != "$pr_head_sha" ]; then
            echo "::error::Hosted closure branch SHA does not match PR head SHA."
            echo "branch=$closure_sha"
            echo "pr=$pr_head_sha"
            exit 1
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/check-runs" \
            -f name="PR verification" \
            -f head_sha="$closure_sha" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=Hosted closure PR verification" \
            -f "output[summary]=Deterministic hosted task closure branch verified for task ${{ steps.prepare.outputs.task_id }} from source PR #${{ steps.prepare.outputs.pr_number }}."
      - name: Enable auto-merge for hosted closure PR
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          (steps.existing.outputs.pr_url != '' || steps.create-pr.outputs.pr_url != '')
        run: |
          set -euo pipefail
          pr_url="${{ steps.existing.outputs.pr_url }}"
          if [ -z "$pr_url" ]; then
            pr_url="${{ steps.create-pr.outputs.pr_url }}"
          fi
          if gh pr merge --merge --delete-branch "$pr_url"; then
            echo "Hosted closure PR merged immediately: $pr_url"
          elif ! gh pr merge --auto --merge --delete-branch "$pr_url"; then
            echo "::warning::Hosted closure PR created but neither direct merge nor auto-merge could be enabled; inspect $pr_url manually."
          fi
