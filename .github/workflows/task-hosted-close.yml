name: Task Hosted Close

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  hosted-close:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      GIT_AUTHOR_NAME: agentplane-bot
      GIT_AUTHOR_EMAIL: agentplane-bot@example.com
      GIT_COMMITTER_NAME: agentplane-bot
      GIT_COMMITTER_EMAIL: agentplane-bot@example.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/heads/main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Build packages (dist + manifests)
        run: |
          bun run --filter=@agentplaneorg/core build
          bun run --filter=agentplane build
      - name: Prepare hosted closure metadata
        id: prepare
        run: |
          set -euo pipefail
          mkdir -p .agentplane/tmp
          node scripts/prepare-hosted-task-closure.mjs --event-json "$GITHUB_EVENT_PATH" > .agentplane/tmp/hosted-task-close.json
          node <<'EOF'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(".agentplane/tmp/hosted-task-close.json", "utf8"));
          const out = process.env.GITHUB_OUTPUT;
          if (!out) throw new Error("GITHUB_OUTPUT is not set");
          const lines = [`actionable=${payload.actionable ? "true" : "false"}`];
          for (const key of ["task_id", "base_ref", "merge_sha", "source_branch", "closure_branch", "pr_number"]) {
            if (typeof payload[key] === "string" || typeof payload[key] === "number") {
              lines.push(`${key}=${payload[key]}`);
            }
          }
          if (typeof payload.reason === "string") lines.push(`reason=${payload.reason}`);
          if (typeof payload.pr_title === "string") {
            lines.push("pr_title<<EOF");
            lines.push(payload.pr_title);
            lines.push("EOF");
          }
          if (typeof payload.pr_body === "string") {
            lines.push("pr_body<<EOF");
            lines.push(payload.pr_body);
            lines.push("EOF");
          }
          fs.appendFileSync(out, `${lines.join("\n")}\n`);
          EOF
      - name: Skip non-task PRs
        if: steps.prepare.outputs.actionable != 'true'
        run: |
          echo "task hosted close skipped: ${{ steps.prepare.outputs.reason }}"
      - name: Check for existing hosted closure PR
        if: steps.prepare.outputs.actionable == 'true'
        id: existing
        run: |
          set -euo pipefail
          pr_url="$(gh pr list \
            --state open \
            --head "${{ steps.prepare.outputs.closure_branch }}" \
            --base "${{ steps.prepare.outputs.base_ref }}" \
            --json url \
            --jq '.[0].url // ""')"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "${{ steps.prepare.outputs.closure_branch }}" >/dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply hosted task closure on a local base checkout
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          steps.existing.outputs.pr_url == '' &&
          steps.existing.outputs.branch_exists != 'true'
        id: close
        run: |
          set -euo pipefail
          before="$(git rev-parse HEAD)"
          node packages/agentplane/bin/agentplane.js task hosted-close \
            --event-json "$GITHUB_EVENT_PATH" \
            --quiet
          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            echo "closure_sha=$after" >> "$GITHUB_OUTPUT"
          else
            echo "created_commit=true" >> "$GITHUB_OUTPUT"
            echo "closure_sha=$after" >> "$GITHUB_OUTPUT"
          fi
      - name: Push hosted closure branch
        if: steps.close.outputs.created_commit == 'true'
        run: |
          set -euo pipefail
          git switch -c "${{ steps.prepare.outputs.closure_branch }}"
          git push --set-upstream origin "${{ steps.prepare.outputs.closure_branch }}"
      - name: Open or recover hosted closure PR
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          steps.existing.outputs.pr_url == ''
        id: create-pr
        run: |
          set -euo pipefail
          if [ "${{ steps.existing.outputs.branch_exists }}" = "true" ] || [ "${{ steps.close.outputs.created_commit }}" = "true" ]; then
            printf '%s\n' "${{ steps.prepare.outputs.pr_body }}" > .agentplane/tmp/hosted-task-close-pr.md
            pr_url="$(gh pr create \
              --base "${{ steps.prepare.outputs.base_ref }}" \
              --head "${{ steps.prepare.outputs.closure_branch }}" \
              --title "${{ steps.prepare.outputs.pr_title }}" \
              --body-file .agentplane/tmp/hosted-task-close-pr.md)"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable auto-merge for hosted closure PR
        if: |
          steps.prepare.outputs.actionable == 'true' &&
          (steps.existing.outputs.pr_url != '' || steps.create-pr.outputs.pr_url != '')
        run: |
          set -euo pipefail
          pr_url="${{ steps.existing.outputs.pr_url }}"
          if [ -z "$pr_url" ]; then
            pr_url="${{ steps.create-pr.outputs.pr_url }}"
          fi
          if ! gh pr merge --auto --squash "$pr_url"; then
            echo "::warning::Hosted closure PR created but auto-merge could not be enabled; inspect $pr_url manually."
          fi
