<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
<style>
  .display { font-family: 'Inter Display', 'Inter', 'Arial', sans-serif; }
  .sans { font-family: 'Inter', 'Arial', sans-serif; }
