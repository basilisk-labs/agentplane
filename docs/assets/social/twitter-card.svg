        <tspan font-weight="850">agent/</tspan><tspan font-weight="520">plane</tspan>
      </text>
    </g>
<text class="mono" x="72" y="180" font-size="22" fill="#005CFF">&gt; repo-local audit trail for agents</text>
<text class="display" x="72" y="290" font-size="58" fill="#070707" font-weight="830" letter-spacing="-3.19">Stop your coding agent</text>
